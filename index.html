<!DOCTYPE html>
<html lang="en">

<!-- insp: https://www.theodysseyonline.com/media-library/image.jpg?id=56079781 -->

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vending machine</title>
    <link rel="stylesheet" type="text/css" href="style.css">
</head>

<body>
    <main id="machineContainer" class="flexRow center">
        <aside id="coinsContainer" class="flexRow alignCenter">
            <ul id="coinsList" class="flexCol alignCenter">
                <li class="coin center" draggable="true" data-value="0.25">
                    <h2>R$0.25</h2>
                </li>
                <li class="coin center" draggable="true" data-value="0.5">
                    <h2>R$0.50</h2>
                </li>
                <li class="coin center" draggable="true" data-value="1.00">
                    <h2>R$1.00</h2>
                </li>
            </ul>
        </aside>
        <section id="machine" class="flexCol">
            <div id="drinksList" class="items flexCol">
                <!--fetched using js-->
            </div>
            <footer id="lowerPanel" class="flexCol alignCenter">
                <div id="balancePanel" class="flexRow alignCenter">
                    <output id="balance">R$0.00</output>
                    <div id="coinSlot" class="center"></div>
                </div>
                <div id="drinkDrop" class="flexCol center">
                    <span id="drinkDropText"></span>
                    <span id="drinkChange"></span>
                </div>
            </footer>
        </section>
    </main>
</body>
<script src="script.js"></script>

</html>
